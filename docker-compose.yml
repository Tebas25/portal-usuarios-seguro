version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak_transporte
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    command: start-dev
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data

  mongodb:
    image: mongo:latest
    container_name: mongo_transporte
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  ldap:
    image: osixia/openldap:1.5.0
    container_name: ldap_transporte
    ports:
      - "389:389"
    environment:
      - LDAP_ORGANISATION=Transporte
      - LDAP_DOMAIN=transporte.com
      - LDAP_ADMIN_PASSWORD=admin

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: ldap_ui_transporte
    ports:
      - "6443:443"
    environment:
      - PHPLDAPADMIN_LDAP_HOSTS=ldap
    depends_on:
      - ldap

volumes:
  keycloak_data:
  mongodb_data: