version: '3.8'

services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak_transporte
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    command: start-dev
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data

  ldap:
    image: osixia/openldap:1.5.0
    container_name: ldap_transporte
    ports:
      - "389:389"
    environment:
      - LDAP_ORGANISATION=Transporte
      - LDAP_DOMAIN=transporte.com
      - LDAP_ADMIN_PASSWORD=admin

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: ldap_ui_transporte
    ports:
      - "6443:443"
    environment:
      - PHPLDAPADMIN_LDAP_HOSTS=ldap
    depends_on:
      - ldap

  vault:
    image: hashicorp/vault:latest
    container_name: vault_transporte
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=root
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
      - VAULT_ADDR=http://127.0.0.1:8200
    command: server -dev

volumes:
  keycloak_data: